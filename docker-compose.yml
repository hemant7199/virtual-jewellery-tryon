version: '3.8'

services:
  # MongoDB
  mongo:
    image: mongo:7
    container_name: glimmr_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: jewellery_tryon

  # Node.js Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: glimmr_backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=development
      - PORT=5000
      - MONGO_URI=mongodb://mongo:27017/jewellery_tryon
      - JWT_SECRET=docker_dev_secret_change_in_prod
      - FRONTEND_URL=http://localhost:3000
    depends_on:
      - mongo
    volumes:
      - ./backend:/app
      - /app/node_modules

  # React Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: glimmr_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:5000/api
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

  # Python ML Service (optional)
  ml_service:
    image: python:3.11-slim
    container_name: glimmr_ml
    working_dir: /app
    command: >
      bash -c "pip install flask flask-cors pandas scikit-learn numpy &&
               python ml_service.py"
    ports:
      - "5001:5001"
    volumes:
      - ./dataset:/app

volumes:
  mongo_data:
